<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">TOEFL iBT Practice Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --pri:#6C82E6;--acc:#C65A2E;--bg:#F3EDE4;--txt:#3B2A22;
  --ok:#4CAF50;--err:#F44336;--card:#FFFAF5;--border:#EDE8E3;--gray:#9A8880;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--txt);line-height:1.7;min-height:100vh;}
.wrap{max-width:900px;margin:0 auto;padding:20px;}

/* Timer */
.tbar{position:sticky;top:0;background:#fff;border-bottom:2px solid var(--border);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.tleft{display:flex;flex-direction:column;gap:2px;}
.sec-lbl{font-size:.75em;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray);}
.part-lbl{font-size:.82em;color:var(--gray);}
.tdisp{font-size:1.5em;font-weight:800;color:var(--pri);font-variant-numeric:tabular-nums;letter-spacing:.02em;}
.tdisp.warn{color:var(--acc);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.tup{background:var(--acc);color:#fff;text-align:center;padding:9px;font-weight:600;font-size:.92em;}

/* Buttons */
.btn{padding:10px 22px;border:none;border-radius:12px;cursor:pointer;font-size:.93em;font-weight:600;transition:all .18s;font-family:inherit;}
.btn-pri{background:linear-gradient(135deg,#6C82E6,#5568D4);color:#fff;box-shadow:0 4px 14px rgba(108,130,230,.38);}
.btn-pri:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(108,130,230,.5);}
.btn-acc{background:var(--acc);color:#fff;}
.btn-acc:hover{background:#b54f28;}
.btn-gray{background:#E8E4DF;color:var(--txt);}
.btn-gray:hover{background:#ddd8d2;}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px;}

/* Split layout */
.split{display:grid;grid-template-columns:44% 54%;gap:18px;align-items:start;}
.left-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;position:sticky;top:68px;max-height:calc(100vh - 90px);overflow-y:auto;}
.right-panel{display:flex;flex-direction:column;gap:14px;overflow-y:auto;max-height:calc(100vh - 90px);}

/* Nav row */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:22px;padding-top:14px;border-top:1px solid var(--border);}
.nav-r{display:flex;gap:10px;align-items:center;}

/* Part header */
.ph{margin-bottom:22px;padding-bottom:14px;border-bottom:2px solid var(--border);}
.pt{font-size:1.35em;font-weight:800;color:var(--pri);}
.ps{color:var(--gray);font-size:.86em;margin-top:2px;}

/* Instruction */
.inst{background:#EEF1FF;border-left:3px solid var(--pri);padding:11px 15px;border-radius:0 8px 8px 0;margin-bottom:18px;font-size:.88em;}

/* Progress */
.prog-out{background:var(--border);border-radius:4px;height:5px;margin:6px 0;}
.prog-in{background:var(--pri);height:100%;border-radius:4px;transition:width .3s;}

/* MCQ */
.qcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
.qtxt{font-weight:600;margin-bottom:11px;font-size:.93em;}
.opt{display:flex;align-items:flex-start;gap:9px;padding:9px 13px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:7px;cursor:pointer;transition:all .14s;font-size:.9em;}
.opt:hover{border-color:var(--pri);background:#f0f3ff;}
.opt.sel{border-color:var(--pri);background:#eef1ff;}
.opt.cor{border-color:var(--ok);background:#e8f5e9;}
.opt.wrong{border-color:var(--err);background:#ffebee;}
.opt-lt{font-weight:700;color:var(--pri);min-width:18px;}
.ans-hint{font-size:.8em;color:var(--ok);margin-top:5px;font-weight:600;}

/* Letter-box blanks (one box per missing letter) */
.lboxes{display:inline-flex;gap:3px;vertical-align:middle;margin:0 2px;}
.lb{width:26px;height:28px;border:none;border-bottom:2.5px solid var(--pri);background:transparent;text-align:center;font-size:.92em;font-family:Helvetica,Arial,sans-serif;font-weight:600;color:var(--acc);outline:none;transition:border-color .15s,background .15s;padding:0;caret-color:var(--acc);}
.lb:focus{border-bottom-color:var(--acc);background:rgba(108,130,230,.07);}
.lb.lb-cor{border-bottom-color:var(--ok);color:var(--ok);background:rgba(76,175,80,.08);}
.lb.lb-wrong{border-bottom-color:var(--err);color:var(--err);background:rgba(244,67,54,.08);}
.lb:read-only{cursor:default;}
.para{font-size:.95em;line-height:2.5;}
.blank-wrap{display:inline-block;position:relative;white-space:nowrap;vertical-align:baseline;}
.bnum{font-size:.65em;vertical-align:super;color:var(--pri);font-weight:800;margin-right:1px;}
.pfx{font-weight:700;color:var(--txt);font-size:.95em;letter-spacing:.01em;}
.bi{border:none;border-bottom:2.5px solid var(--pri);background:transparent;padding:1px 2px;font-size:.93em;font-family:'Courier New',Courier,monospace;letter-spacing:3px;color:var(--acc);font-weight:700;outline:none;transition:border-color .15s;text-align:left;min-width:14px;}
.bi::placeholder{letter-spacing:4px;color:#bbb;font-weight:400;}
.bi:focus{border-bottom-color:var(--acc);}
.bi.cor{border-bottom-color:var(--ok);color:var(--ok);}
.bi.wrong{border-bottom-color:var(--err);color:var(--err);}

/* Word chips */
.wbank{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0;}
.chip{padding:6px 14px;background:var(--pri);color:#fff;border-radius:20px;cursor:pointer;font-size:.88em;user-select:none;transition:all .14s;}
.chip:hover{background:#5568d4;transform:translateY(-1px);}
.chip.used{background:#c0c8f0;cursor:default;transform:none;}
.built{min-height:48px;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;margin:10px 0;background:#fff;font-size:.93em;}
.bword{display:inline-block;padding:3px 10px;background:var(--acc);color:#fff;border-radius:14px;margin:2px;cursor:pointer;font-size:.88em;}
.bword:hover{background:#b54f28;}

/* Textarea */
.ta{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:13px;font-size:.93em;font-family:inherit;line-height:1.75;resize:vertical;min-height:150px;outline:none;background:#fff;color:var(--txt);}
.ta:focus{border-color:var(--pri);}
.wc{font-size:.82em;color:var(--gray);text-align:right;margin-top:5px;}
.wc.warn{color:var(--acc);}

/* Discussion */
.disc{background:#fff8f5;border:1px solid #f0e0d8;border-radius:12px;padding:18px;margin-bottom:18px;}
.spk{margin-bottom:12px;}
.spk-name{font-weight:700;color:var(--acc);font-size:.78em;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}

/* Passage nav */
.pnav{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.pdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78em;font-weight:700;cursor:pointer;transition:all .15s;}

/* Intro */
.intro{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:20px;}
.ititle{font-size:2.6em;font-weight:900;color:var(--pri);margin-bottom:4px;}
.iinfo{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:20px 0;width:100%;max-width:480px;}
.icard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center;}
.icard h3{color:var(--pri);font-size:1.05em;margin-bottom:3px;}
.icard p{color:var(--gray);font-size:.87em;}
.struct{max-width:480px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:28px;text-align:left;}

/* AI score */
.sc-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:18px;}
.sc-num{font-size:2.2em;font-weight:900;color:var(--pri);}
.fb-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0;}
.fb-box{background:#f9f5f0;border-radius:8px;padding:12px;}
.fb-lbl{font-size:.75em;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}

/* Spinner */
.spin{display:inline-block;width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:sp .75s linear infinite;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg)}}

/* Results */
.res-total{text-align:center;padding:36px;background:var(--card);border-radius:16px;margin-bottom:22px;}
.res-big{font-size:4.5em;font-weight:900;color:var(--pri);}
.res-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px;}
.res-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center;}
.res-s{font-size:2em;font-weight:800;}

/* Results review sections */
.rev-sec{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.rev-title{font-weight:800;font-size:1em;color:var(--pri);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.rev-q{padding:10px;border-radius:8px;margin-bottom:8px;font-size:.86em;}
@media(max-width:480px){
  .split{grid-template-columns:1fr;}
  .left-panel{position:static;max-height:260px;}
  .right-panel{max-height:none;}
  .iinfo,.res-grid,.fb-grid{grid-template-columns:1fr;}
}
</style>
<script src="exam-data.js"></script>
</head>
<body>

<div id="tup" style="display:none;" class="tup">ŌÅ░ Time is up! You may still continue.</div>
<div id="tbar" class="tbar" style="display:none;">
  <div class="tleft">
    <div class="sec-lbl" id="slbl">Reading Section</div>
    <div class="part-lbl" id="plbl">Part 1 ŌĆö Complete the Words</div>
  </div>
  <div class="tdisp" id="tdisp">27:00</div>
</div>
<div class="wrap" id="app"></div>

<script>
// ===== DATA & SCHEMA =====
const D = window.EXAM_DATA;
const isETS = !!(D.m1 && D.m2); // two-module ETS schema vs legacy r1/r2/r3

// ===== STATE =====
const S = {
  screen:'intro',
  // ETS reading
  module:1, mPart:1, tIdx:0,
  m1r1ans:Array(10).fill(''), m2r1ans:Array(10).fill(''),
  m1rans:Array(10).fill(null), m2rans:Array(10).fill(null),
  m1Time:12*60, m2Time:12*60, m1Exp:false, m2Exp:false,
  // Legacy reading
  rPart:1,
  r1ans:Array(10).fill(''), r2ans:Array(15).fill(null), r3ans:Array(15).fill(null),
  rTime:20*60, rExp:false,
  // Writing (shared)
  wPart:1, wQIdx:0,
  w1built:Array.from({length:10},()=>[]),
  w2ans:'', w3ans:'',
  w1Time:5*60, w2Time:7*60, w3Time:10*60,
  w1Exp:false, w2Exp:false, w3Exp:false,
  tInt:null, done:false,
  w2sc:null, w3sc:null, w2ld:false, w3ld:false, w2er:null, w3er:null
};

// ===== W1 ORDERS =====
let W1ORDERS=null;
function getW1Order(i){if(!W1ORDERS)W1ORDERS=D.w1.map(q=>shuffle([...q.words]));return W1ORDERS[i];}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ===== HELPERS =====
const $=id=>document.getElementById(id);
const app=()=>$('app');
function wc(t){return t.trim()===''?0:t.trim().split(/\s+/).length;}
function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function onW2Input(v){S.w2ans=v;const c=wc(v);const el=$('w2wc');if(el){el.textContent=`Words: ${c} / 80ŌĆō120`;el.className=`wc${(c<80||c>120)?' warn':''}`;}}
function onW3Input(v){S.w3ans=v;const c=wc(v);const el=$('w3wc');if(el){el.textContent=`Words: ${c} / 100ŌĆō150`;el.className=`wc${(c<100||c>150)?' warn':''}`;}}

// ===== TIMER =====
function startTimer(mode){
  clearInterval(S.tInt);
  S.timerMode=mode;
  updTimer();
  S.tInt=setInterval(()=>{
    const m=S.timerMode;
    const key=m+'Time', expKey=m+'Exp';
    if(S[key]>0){S[key]--;updTimer();}
    else if(!S[expKey]){
      S[expKey]=true;
      if(m==='m1') goModule2();
      else if(m==='m2') goWriting();
      else if(m==='r') goWriting();
      else if(m==='w1') nextWPart();
      else if(m==='w2') nextWPart();
      else if(m==='w3') goResults();
    }
  },1000);
}
function updTimer(){
  const m=S.timerMode||'r';
  const t=m==='m1'?S.m1Time:m==='m2'?S.m2Time:m==='r'?S.rTime:m==='w1'?S.w1Time:m==='w2'?S.w2Time:S.w3Time;
  const el=$('tdisp');if(!el)return;
  el.textContent=fmt(t);
  el.className='tdisp'+(t<300?' warn':'');
}
function stopTimer(){clearInterval(S.tInt);S.tInt=null;}

// ===== NAV =====
function goReading(){
  $('tbar').style.display='flex';$('tup').style.display='none';
  if(isETS){
    S.screen='r';S.module=1;S.mPart=1;S.tIdx=0;
    startTimer('m1');renderReadingETS();
  } else {
    S.screen='r';S.rPart=1;S.tIdx=0;
    startTimer('r');renderReading();
  }
}
function goModule2(){
  stopTimer();
  $('tup').style.display='none';
  S.module=2;S.mPart=1;S.tIdx=0;
  startTimer('m2');renderReadingETS();
}
function goWriting(){
  stopTimer();S.screen='w';S.wPart=1;S.wQIdx=0;
  $('tup').style.display='none';$('slbl').textContent='Writing Section';
  startTimer('w1');renderWriting();
}
function goResults(){
  stopTimer();S.screen='res';S.done=true;
  $('tbar').style.display='none';$('tup').style.display='none';
  renderResults();
  autoScoreSequential();
}
async function autoScoreSequential(){
  if(S.w2ans.trim()&&!S.w2sc&&!S.w2ld){
    S.w2ld=true;renderResults();
    try{var ctx='Situation: '+D.w2.situation+'\nTasks: '+D.w2.tasks.join(' / ');S.w2sc=await callScore(S.w2ans,D.w2.rubric,ctx);}
    catch(e){S.w2er='Scoring error: '+e.message;}
    S.w2ld=false;renderResults();
  }
  if(S.w3ans.trim()&&!S.w3sc&&!S.w3ld){
    S.w3ld=true;renderResults();
    try{var ctx='Professor '+D.w3.prof.name+': "'+D.w3.prof.msg+'"\n'+D.w3.sa.name+': "'+D.w3.sa.txt+'"\n'+D.w3.sb.name+': "'+D.w3.sb.txt+'"';S.w3sc=await callScore(S.w3ans,D.w3.rubric,ctx);}
    catch(e){S.w3er='Scoring error: '+e.message;}
    S.w3ld=false;renderResults();
  }
}
async function autoScoreW2(){
  if(S.w2ld)return;
  S.w2ld=true;S.w2sc=null;S.w2er=null;renderResults();
  try{var ctx='Situation: '+D.w2.situation+'\nTasks: '+D.w2.tasks.join(' / ');S.w2sc=await callScore(S.w2ans,D.w2.rubric,ctx);}
  catch(e){S.w2er='Scoring error: '+e.message;}
  S.w2ld=false;renderResults();
}
async function autoScoreW3(){
  if(S.w3ld)return;
  S.w3ld=true;S.w3sc=null;S.w3er=null;renderResults();
  try{var ctx='Professor '+D.w3.prof.name+': "'+D.w3.prof.msg+'"\n'+D.w3.sa.name+': "'+D.w3.sa.txt+'"\n'+D.w3.sb.name+': "'+D.w3.sb.txt+'"';S.w3sc=await callScore(S.w3ans,D.w3.rubric,ctx);}
  catch(e){S.w3er='Scoring error: '+e.message;}
  S.w3ld=false;renderResults();
}

// ===== ETS READING =====
function renderReadingETS(){
  $('slbl').textContent='Reading Section';
  $('plbl').textContent=`Module ${S.module} of 2 ŌĆö `+(S.mPart===1?'Complete the Words':'Reading');
  if(S.mPart===1)renderR1ETS();
  else renderReadingPanel();
}
function renderR1ETS(){
  const mod=S.module===1?D.m1:D.m2;
  const segs=mod.r1.segs, bl=mod.r1.blanks;
  const r1ans=S.module===1?S.m1r1ans:S.m2r1ans;
  let html='<p class="para">'+segs[0];
  for(let i=0;i<10;i++){
    const v=r1ans[i]||'', suf=bl[i].suffix, letters=v.split('');
    let boxes='';
    for(let j=0;j<suf.length;j++){
      let cls='lb';
      if(S.done){const t=(letters[j]||'').toLowerCase(),e=suf[j].toLowerCase();cls+=t===e?' lb-cor':' lb-wrong';}
      boxes+=`<input class="${cls}" data-i="${i}" data-j="${j}" maxlength="1" value="${escH(letters[j]||'')}" autocomplete="off" spellcheck="false"${S.done?' readonly':''}>`;
    }
    html+=`<span class="blank-wrap"><sup class="bnum">${i+1}</sup><span class="pfx">${escH(bl[i].prefix)}</span><span class="lboxes">${boxes}</span></span>`;
    html+=segs[i+1];
  }
  html+=segs[11]+'</p>';
  let keyHTML='';
  if(S.done){
    keyHTML='<div style="margin-top:22px;border-top:1px solid var(--border);padding-top:16px;"><div style="font-weight:700;color:var(--pri);margin-bottom:10px;font-size:.9em;">Answer Key</div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;">';
    bl.forEach((b,i)=>{
      const u=r1ans[i]||'', ok=u.toLowerCase()===b.suffix.toLowerCase();
      keyHTML+=`<div style="padding:9px 8px;border-radius:8px;background:${ok?'#e8f5e9':'#ffebee'};font-size:.83em;text-align:center;">
        <div style="font-weight:700;color:${ok?'var(--ok)':'var(--err)'};">${i+1}. ${escH(b.ans)}</div>
        <div style="font-size:.85em;color:var(--gray);margin-top:2px;">${ok?'Ō£ō Correct':`answer: <em>${escH(b.suffix)}</em>`}</div>
        ${!ok&&u?`<div style="color:var(--err);font-size:.85em;">you typed: ${escH(u)}</div>`:''}
      </div>`;
    });
    keyHTML+='</div></div>';
  }
  app().innerHTML=`
    <div class="ph"><div class="pt">Module ${S.module} ŌĆö Complete the Words</div><div class="ps">Questions 1ŌĆō10 ┬Ę Type the missing letters to complete each word</div></div>
    <div class="inst">­¤ÆĪ Each box = one missing letter. The word's first letters are shown ŌĆö just fill in the rest.<br>Example: <strong>develop</strong>[<span style="display:inline-flex;gap:2px;vertical-align:middle;"><span style="display:inline-block;width:22px;height:22px;border-bottom:2px solid var(--acc);text-align:center;font-size:.9em;color:var(--acc);font-weight:600;">m</span><span style="display:inline-block;width:22px;height:22px;border-bottom:2px solid var(--acc);text-align:center;font-size:.9em;color:var(--acc);font-weight:600;">e</span><span style="display:inline-block;width:22px;height:22px;border-bottom:2px solid var(--acc);text-align:center;font-size:.9em;color:var(--acc);font-weight:600;">n</span><span style="display:inline-block;width:22px;height:22px;border-bottom:2px solid var(--acc);text-align:center;font-size:.9em;color:var(--acc);font-weight:600;">t</span>}] = <strong>development</strong></div>
    <div class="card">${html}${keyHTML}</div>
    <div class="nav"><div></div><button class="btn btn-acc" onclick="nextMPart()">Next Part ŌåÆ</button></div>`;
  document.querySelectorAll('.lb').forEach(el=>{
    el.addEventListener('keydown',e=>{
      const i=parseInt(el.dataset.i),j=parseInt(el.dataset.j);
      if(e.key==='Backspace'&&!el.value&&j>0){e.preventDefault();const p=document.querySelector(`.lb[data-i="${i}"][data-j="${j-1}"]`);if(p){p.value='';p.focus();collectR1ETS(i);}}
      if(e.key==='ArrowRight'){const n=document.querySelector(`.lb[data-i="${i}"][data-j="${j+1}"]`);if(n)n.focus();}
      if(e.key==='ArrowLeft'&&j>0){const p=document.querySelector(`.lb[data-i="${i}"][data-j="${j-1}"]`);if(p)p.focus();}
    });
    el.addEventListener('input',e=>{
      const i=parseInt(el.dataset.i),j=parseInt(el.dataset.j);
      if(el.value.length>1)el.value=el.value.slice(-1);
      collectR1ETS(i);
      if(el.value){
        const bl2=(S.module===1?D.m1:D.m2).r1.blanks;
        if(j<bl2[i].suffix.length-1){const n=document.querySelector(`.lb[data-i="${i}"][data-j="${j+1}"]`);if(n)n.focus();}
      }
    });
  });
}
function collectR1ETS(i){
  const boxes=document.querySelectorAll(`.lb[data-i="${i}"]`);
  const val=Array.from(boxes).map(b=>b.value).join('');
  if(S.module===1)S.m1r1ans[i]=val;else S.m2r1ans[i]=val;
}
function saveR1ETS(){for(let i=0;i<10;i++)collectR1ETS(i);}
function nextMPart(){saveR1ETS();S.mPart=2;S.tIdx=0;renderReadingETS();}

function renderReadingPanel(){
  const mod=S.module===1?D.m1:D.m2;
  const texts=mod.reading.texts;

var R_TABLE=[
  {min:40,max:40,score:6.0},{min:37,max:39,score:5.5},{min:33,max:36,score:5.0},
  {min:30,max:32,score:4.5},{min:26,max:29,score:4.0},{min:23,max:25,score:3.5},
  {min:19,max:22,score:3.0},{min:16,max:18,score:2.5},{min:13,max:15,score:2.0},
  {min:9,max:12,score:1.5},{min:6,max:8,score:1.0},{min:1,max:5,score:0.5},{min:0,max:0,score:0.0}
];
function toflR(a,b,c){var t=a+b+c;for(var k=0;k<R_TABLE.length;k++){if(t>=R_TABLE[k].min&&t<=R_TABLE[k].max)return R_TABLE[k].score;}return 0;}
function toflW(w1ok,w2sc,w3sc){
  var parts=[w1ok/10],weights=[1];
  if(w2sc){parts.push(w2sc.score/5);weights.push(1);}
  if(w3sc){parts.push(w3sc.score/5);weights.push(1);}
  var sum=0,wtot=0;
  for(var k=0;k<parts.length;k++){sum+=parts[k]*weights[k];wtot+=weights[k];}
  return Math.round(sum/wtot*6*2)/2;
}
function toflTotal(r,w){return Math.round((r+w)/2*2)/2;}
function scoreColor(v){return v>=5?'var(--ok)':v>=3.5?'var(--pri)':'var(--err)';}
function fmtScore(v){return Number(v).toFixed(1);}

    +'<div style="display:flex;justify-content:space-between;font-size:.82em;padding:3px 0;border-bottom:1px solid var(--border);"><span style="color:var(--gray);">Part 1 ŌĆö Build a Sentence</span><span style="font-weight:700;color:'+(w1ok/10>=.7?'var(--ok)':w1ok/10>=.5?'var(--pri)':'var(--err)')+';">'+w1ok+' / 10</span></div>'

    +'<div style="display:flex;justify-content:space-between;font-size:.82em;padding:3px 0;border-bottom:1px solid var(--border);"><span style="color:var(--gray);">Part 3 ŌĆö Academic Discussion (AI)</span><span style="font-weight:700;color:var(--gray);">'+w3disp2+'</span></div>'
    +'</div>';

  var totalDisp=wFull
    ?'<span style="font-size:3.2em;font-weight:900;color:'+scoreColor(tT)+';">'+fmtScore(tT)+'</span><span style="font-size:1.1em;color:var(--gray);font-weight:400;"> / 6</span>'
    :spinnerSm+'<span style="font-size:.88em;color:var(--gray);margin-left:10px;">Waiting for writing scoresŌĆ”</span>';

  app().innerHTML=
    '<div style="padding:20px 0 50px;">'
    +'<div class="res-total">'
    +'<div style="font-size:.82em;color:var(--gray);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;">TOEFL Practice Test '+_tn+' &middot; Score Report</div>'
    +'<div style="font-size:.72em;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);margin-bottom:4px;">Total Score</div>'
    +'<div style="margin-bottom:4px;">'+totalDisp+'</div>'
    +'<div style="font-size:.8em;color:var(--gray);margin-top:2px;">(Reading + Writing average, converted to TOEFL 0ŌĆō6 scale)</div>'
    +'</div>'
    +'<div class="res-grid" style="margin-bottom:22px;">'+rCard+wCardManual+'</div>'
    +'<div style="text-align:center;margin-bottom:28px;"><button class="btn btn-pri" style="font-size:.9em;padding:10px 28px;" onclick="location.reload()">&#8635; Start a New Test</button></div>'
    +'<div style="font-size:.82em;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);margin-bottom:12px;">Answer Review</div>'
    +rRev+w1Rev+wRev
    +'</div>';
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">TOEFL iBT Practice Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Akshar:wght@300..700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --pri:#6C82E6;--acc:#C65A2E;--bg:#F3EDE4;--txt:#3B2A22;
  --ok:#4CAF50;--err:#F44336;--card:#FFFAF5;--border:#EDE8E3;--gray:#9A8880;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--txt);line-height:1.7;min-height:100vh;}
.wrap{max-width:900px;margin:0 auto;padding:20px;}

/* Timer */
.tbar{position:sticky;top:0;background:#fff;border-bottom:2px solid var(--border);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.tleft{display:flex;flex-direction:column;gap:2px;}
.sec-lbl{font-size:.75em;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray);}
.part-lbl{font-size:.82em;color:var(--gray);}
.tdisp{font-size:1.5em;font-weight:800;color:var(--pri);font-variant-numeric:tabular-nums;letter-spacing:.02em;}
.tdisp.warn{color:var(--acc);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.tup{background:var(--acc);color:#fff;text-align:center;padding:9px;font-weight:600;font-size:.92em;}

/* Buttons */
.btn{padding:10px 22px;border:none;border-radius:12px;cursor:pointer;font-size:.93em;font-weight:600;transition:all .18s;font-family:inherit;}
.btn-pri{background:linear-gradient(135deg,#6C82E6,#5568D4);color:#fff;box-shadow:0 4px 14px rgba(108,130,230,.38);}
.btn-pri:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(108,130,230,.5);}
.btn-acc{background:var(--acc);color:#fff;}
.btn-acc:hover{background:#b54f28;}
.btn-gray{background:#E8E4DF;color:var(--txt);}
.btn-gray:hover{background:#ddd8d2;}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px;}

/* Split layout */
.split{display:grid;grid-template-columns:44% 54%;gap:18px;align-items:start;}
.left-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;position:sticky;top:68px;max-height:calc(100vh - 90px);overflow-y:auto;}
.right-panel{display:flex;flex-direction:column;gap:14px;overflow-y:auto;max-height:calc(100vh - 90px);}

/* Nav row */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:22px;padding-top:14px;border-top:1px solid var(--border);}
.nav-r{display:flex;gap:10px;align-items:center;}

/* Part header */
.ph{margin-bottom:22px;padding-bottom:14px;border-bottom:2px solid var(--border);}
.pt{font-size:1.35em;font-weight:800;color:var(--pri);}
.ps{color:var(--gray);font-size:.86em;margin-top:2px;}

/* Instruction */
.inst{background:#EEF1FF;border-left:3px solid var(--pri);padding:11px 15px;border-radius:0 8px 8px 0;margin-bottom:18px;font-size:.88em;}

/* Progress */
.prog-out{background:var(--border);border-radius:4px;height:5px;margin:6px 0;}
.prog-in{background:var(--pri);height:100%;border-radius:4px;transition:width .3s;}

/* MCQ */
.qcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
.qtxt{font-weight:600;margin-bottom:11px;font-size:.93em;}
.opt{display:flex;align-items:flex-start;gap:9px;padding:9px 13px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:7px;cursor:pointer;transition:all .14s;font-size:.9em;font-family:'Akshar',sans-serif;}
.opt:hover{border-color:var(--pri);background:#f0f3ff;}
.opt.sel{border-color:var(--pri);background:#eef1ff;}
.opt.cor{border-color:var(--ok);background:#e8f5e9;}
.opt.wrong{border-color:var(--err);background:#ffebee;}
.opt-lt{font-weight:700;color:var(--pri);min-width:18px;}
.ans-hint{font-size:.8em;color:var(--ok);margin-top:5px;font-weight:600;}
/* Speaking countdown ring */
.cring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;}
.cring-wrap svg{position:absolute;top:0;left:0;}
.cring-num{font-size:1.3em;font-weight:700;color:var(--pri);z-index:1;}
/* Listening per-question countdown bar */
.qtimer{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f8f6f2;border-radius:8px;margin-bottom:12px;}
.qtimer-bar{flex:1;height:4px;background:var(--border);border-radius:2px;}
.qtimer-fill{height:100%;border-radius:2px;transition:width .9s linear;background:var(--pri);}

/* Letter-box blanks (one box per missing letter) */
.lboxes{display:inline-flex;gap:3px;vertical-align:middle;margin:0 2px;}
.lb{width:26px;height:28px;border:none;border-bottom:1px solid #000;background:transparent;text-align:center;font-size:.92em;font-family:Helvetica,Arial,sans-serif;font-weight:400;color:#000;outline:none;transition:border-color .15s,background .15s;padding:0;caret-color:#000;}
.lb:focus{border-bottom-color:var(--acc);background:rgba(108,130,230,.07);}
.lb.lb-cor{border-bottom-color:var(--ok);color:var(--ok);background:rgba(76,175,80,.08);}
.lb.lb-wrong{border-bottom-color:var(--err);color:var(--err);background:rgba(244,67,54,.08);}
.lb:read-only{cursor:default;}
.para{font-size:.95em;line-height:2.5;font-family:'Akshar',sans-serif;}
.akshar{font-family:'Akshar',sans-serif;}
.blank-wrap{display:inline-block;position:relative;white-space:nowrap;vertical-align:baseline;}
.bnum{font-size:.65em;vertical-align:super;color:var(--pri);font-weight:800;margin-right:1px;}
.pfx{font-weight:400;color:var(--txt);font-size:.95em;letter-spacing:.01em;}
.bi{border:none;border-bottom:1px solid #000;background:transparent;padding:1px 2px;font-size:.93em;font-family:'Courier New',Courier,monospace;letter-spacing:3px;color:#000;font-weight:400;outline:none;transition:border-color .15s;text-align:left;min-width:14px;}
.bi::placeholder{letter-spacing:4px;color:#bbb;font-weight:400;}
.bi:focus{border-bottom-color:var(--acc);}
.bi.cor{border-bottom-color:var(--ok);color:var(--ok);}
.bi.wrong{border-bottom-color:var(--err);color:var(--err);}

/* Word chips */
.wbank{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0;}
.chip{padding:6px 14px;background:var(--pri);color:#fff;border-radius:20px;cursor:pointer;font-size:.88em;user-select:none;transition:all .14s;}
.chip:hover{background:#5568d4;transform:translateY(-1px);}
.chip.used{background:#c0c8f0;cursor:default;transform:none;}
.built{min-height:48px;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;margin:10px 0;background:#fff;font-size:.93em;}
.bword{display:inline-block;padding:3px 10px;background:var(--acc);color:#fff;border-radius:14px;margin:2px;cursor:pointer;font-size:.88em;}
.bword:hover{background:#b54f28;}

/* Textarea */
.ta{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:13px;font-size:.93em;font-family:inherit;line-height:1.75;resize:vertical;min-height:150px;outline:none;background:#fff;color:var(--txt);}
.ta:focus{border-color:var(--pri);}
.wc{font-size:.82em;color:var(--gray);text-align:right;margin-top:5px;}
.wc.warn{color:var(--acc);}

/* Discussion */
.disc{background:#fff8f5;border:1px solid #f0e0d8;border-radius:12px;padding:18px;margin-bottom:18px;}
.spk{margin-bottom:12px;}
.spk-name{font-weight:700;color:var(--acc);font-size:.78em;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}

/* Passage nav */
.pnav{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.pdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78em;font-weight:700;cursor:pointer;transition:all .15s;}

/* Intro */
.intro{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:20px;}
.ititle{font-size:2.6em;font-weight:900;color:var(--pri);margin-bottom:4px;}
.iinfo{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:20px 0;width:100%;max-width:480px;}
.icard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center;}
.icard h3{color:var(--pri);font-size:1.05em;margin-bottom:3px;}
.icard p{color:var(--gray);font-size:.87em;}
.struct{max-width:480px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:28px;text-align:left;}

/* AI score */
.sc-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:18px;}
.sc-num{font-size:2.2em;font-weight:900;color:var(--pri);}
.fb-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0;}
.fb-box{background:#f9f5f0;border-radius:8px;padding:12px;}
.fb-lbl{font-size:.75em;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}

/* Spinner */
.spin{display:inline-block;width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:sp .75s linear infinite;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg)}}

/* Results */
.res-total{text-align:center;padding:36px;background:var(--card);border-radius:16px;margin-bottom:22px;}
.res-big{font-size:4.5em;font-weight:900;color:var(--pri);}
.res-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px;}
.res-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center;}
.res-s{font-size:2em;font-weight:800;}

/* Results review sections */
.rev-sec{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.rev-title{font-weight:800;font-size:1em;color:var(--pri);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.rev-q{padding:10px;border-radius:8px;margin-bottom:8px;font-size:.86em;}
@media(max-width:480px){
  .split{grid-template-columns:1fr;}
  .left-panel{position:static;max-height:260px;}
  .right-panel{max-height:none;}
  .iinfo,.res-grid,.fb-grid{grid-template-columns:1fr;}
}
</style>
<script src="exam-data.js"></script>
</head>
<body>

<div id="tup" style="display:none;" class="tup">⏰ Time is up! You may still continue.</div>
<div id="tbar" class="tbar" style="display:none;">
  <div class="tleft">
    <div class="sec-lbl" id="slbl">Reading Section</div>
    <div class="part-lbl" id="plbl">Part 1 — Complete the Words</div>
  </div>
  <div class="tdisp" id="tdisp">27:00</div>
</div>
<div class="wrap" id="app"></div>

<script>
// ===== DATA & SCHEMA =====
const D = window.EXAM_DATA;
const isETS = !!(D.m1 && D.m2); // two-module ETS schema vs legacy r1/r2/r3

// ===== STATE =====
const S = {
  screen:'intro',
  // ETS reading
  module:1, mPart:1, tIdx:0,
  m1r1ans:Array(10).fill(''), m2r1ans:Array(10).fill(''),
  m1rans:Array(10).fill(null), m2rans:Array(10).fill(null),
  m1Time:12*60, m2Time:12*60, m1Exp:false, m2Exp:false,
  // Legacy reading
  rPart:1,
  r1ans:Array(10).fill(''), r2ans:Array(15).fill(null), r3ans:Array(15).fill(null),
  rTime:20*60, rExp:false,
  // Writing (shared)
  wPart:1, wQIdx:0,
  w1built:Array.from({length:10},()=>[]),
  w2ans:'', w3ans:'',
  w1Time:5*60, w2Time:7*60, w3Time:10*60,
  w1Exp:false, w2Exp:false, w3Exp:false,
  tInt:null, done:false,
  w2sc:null, w3sc:null, w2ld:false, w3ld:false, w2er:null, w3er:null,
  // Listening
  lModule:1, lSecIdx:0, lQIdx:0, lPhase:'listen',
  l1ans:Array(18).fill(null), l2ans:Array(16).fill(null),
  l1Time:10*60, l2Time:10*60, l1Exp:false, l2Exp:false,
  // Speaking
  spPart:1, spQIdx:0,
  spTime:15*60, spExp:false
};

// ===== W1 ORDERS =====
let W1ORDERS=null;
function getW1Order(i){if(!W1ORDERS)W1ORDERS=D.w1.map(q=>shuffle([...q.words]));return W1ORDERS[i];}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ===== HELPERS =====
const $=id=>document.getElementById(id);
const app=()=>$('app');
function wc(t){return t.trim()===''?0:t.trim().split(/\s+/).length;}
function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function onW2Input(v){S.w2ans=v;const c=wc(v);const el=$('w2wc');if(el){el.textContent=`Words: ${c} / 80–120`;el.className=`wc${(c<80||c>120)?' warn':''}`;}}
function onW3Input(v){S.w3ans=v;const c=wc(v);const el=$('w3wc');if(el){el.textContent=`Words: ${c} / 100–150`;el.className=`wc${(c<100||c>150)?' warn':''}`;}}

// ===== TIMER =====
function startTimer(mode){
  clearInterval(S.tInt);
  S.timerMode=mode;
  updTimer();
  S.tInt=setInterval(()=>{
    const m=S.timerMode;
    const key=m+'Time', expKey=m+'Exp';
    if(S[key]>0){S[key]--;updTimer();}
    else if(!S[expKey]){
      S[expKey]=true;
      if(m==='m1') goModule2();
      else if(m==='m2') goListening();
      else if(m==='r') goListening();
      else if(m==='l1') goListeningM2();
      else if(m==='l2') goWriting();
      else if(m==='w1') nextWPart();
      else if(m==='w2') nextWPart();
      else if(m==='w3') goSpeaking();
      else if(m==='sp') goResults();
    }
  },1000);
}
function updTimer(){
  const m=S.timerMode||'r';
  const t=m==='m1'?S.m1Time:m==='m2'?S.m2Time:m==='r'?S.rTime:m==='l1'?S.l1Time:m==='l2'?S.l2Time:m==='sp'?S.spTime:m==='w1'?S.w1Time:m==='w2'?S.w2Time:S.w3Time;
  const el=$('tdisp');if(!el)return;
  el.textContent=fmt(t);
  el.className='tdisp'+(t<300?' warn':'');
}
function stopTimer(){clearInterval(S.tInt);S.tInt=null;}

// ===== NAV =====
function goReading(){
  $('tbar').style.display='flex';$('tup').style.display='none';
  if(isETS){
    S.screen='r';S.module=1;S.mPart=1;S.tIdx=0;
    startTimer('m1');renderReadingETS();
  } else {
    S.screen='r';S.rPart=1;S.tIdx=0;
    startTimer('r');renderReading();
  }
}
function goModule2(){
  stopTimer();
  $('tup').style.display='none';
  S.module=2;S.mPart=1;S.tIdx=0;
  startTimer('m2');renderReadingETS();
}
function goWriting(){
  stopTimer();S.screen='w';S.wPart=1;S.wQIdx=0;
  $('tup').style.display='none';$('slbl').textContent='Writing Section';
  startTimer('w1');renderWriting();
}
function goListening(){
  stopTimer();$('tup').style.display='none';
  S.screen='l';S.lModule=1;S.lSecIdx=0;S.lQIdx=0;S.lPhase='listen';
  $('slbl').textContent='Listening Section';
  $('plbl').textContent='Module 1 of 2';
  startTimer('l1');renderListening();
}
function goListeningM2(){
  stopTimer();$('tup').style.display='none';
  S.lModule=2;S.lSecIdx=0;S.lQIdx=0;S.lPhase='listen';
  $('plbl').textContent='Module 2 of 2';
  startTimer('l2');renderListening();
}
function goSpeaking(){
  stopTimer();S.screen='sp';S.spPart=1;S.spQIdx=0;
  $('tup').style.display='none';
  $('slbl').textContent='Speaking Section';
  $('plbl').textContent='Part 1 — Listen and Repeat';
  startTimer('sp');renderSpeaking();
}
function goResults(){
  stopTimer();S.screen='res';S.done=true;
  $('tbar').style.display='none';$('tup').style.display='none';
  renderResults();
  autoScoreSequential();
}
async function autoScoreSequential(){
  if(S.w2ans.trim()&&!S.w2sc&&!S.w2ld){
    S.w2ld=true;renderResults();
    try{var ctx='Situation: '+D.w2.situation+'\nTasks: '+D.w2.tasks.join(' / ');S.w2sc=await callScore(S.w2ans,D.w2.rubric,ctx);}
    catch(e){S.w2er='Scoring error: '+e.message;}
    S.w2ld=false;renderResults();
  }
  if(S.w3ans.trim()&&!S.w3sc&&!S.w3ld){
    S.w3ld=true;renderResults();
    try{var ctx='Professor '+D.w3.prof.name+': "'+D.w3.prof.msg+'"\n'+D.w3.sa.name+': "'+D.w3.sa.txt+'"\n'+D.w3.sb.name+': "'+D.w3.sb.txt+'"';S.w3sc=await callScore(S.w3ans,D.w3.rubric,ctx);}
    catch(e){S.w3er='Scoring error: '+e.message;}
    S.w3ld=false;renderResults();
  }
}
async function autoScoreW2(){
  if(S.w2ld)return;
  S.w2ld=true;S.w2sc=null;S.w2er=null;renderResults();
  try{var ctx='Situation: '+D.w2.situation+'\nTasks: '+D.w2.tasks.join(' / ');S.w2sc=await callScore(S.w2ans,D.w2.rubric,ctx);}
  catch(e){S.w2er='Scoring error: '+e.message;}
  S.w2ld=false;renderResults();
}
async function autoScoreW3(){
  if(S.w3ld)return;
  S.w3ld=true;S.w3sc=null;S.w3er=null;renderResults();
  try{var ctx='Professor '+D.w3.prof.name+': "'+D.w3.prof.msg+'"\n'+D.w3.sa.name+': "'+D.w3.sa.txt+'"\n'+D.w3.sb.name+': "'+D.w3.sb.txt+'"';S.w3sc=await callScore(S.w3ans,D.w3.rubric,ctx);}
  catch(e){S.w3er='Scoring error: '+e.message;}
  S.w3ld=false;renderResults();
}

// ===== ETS READING =====
function renderReadingETS(){
  $('slbl').textContent='Reading Section';
  $('plbl').textContent=`Module ${S.module} of 2 — `+(S.mPart===1?'Complete the Words':'Reading');
  if(S.mPart===1)renderR1ETS();
  else renderReadingPanel();
}
function renderR1ETS(){
  const mod=S.module===1?D.m1:D.m2;
  const segs=mod.r1.segs, bl=mod.r1.blanks;
  const r1ans=S.module===1?S.m1r1ans:S.m2r1ans;
  let html='<p class="para">'+segs[0];
  for(let i=0;i<10;i++){
    const v=r1ans[i]||'', suf=bl[i].suffix, letters=v.split('');
    let boxes='';
    for(let j=0;j<suf.length;j++){
      let cls='lb';
      if(S.done){const t=(letters[j]||'').toLowerCase(),e=suf[j].toLowerCase();cls+=t===e?' lb-cor':' lb-wrong';}
      boxes+=`<input class="${cls}" data-i="${i}" data-j="${j}" maxlength="1" value="${escH(letters[j]||'')}" autocomplete="off" spellcheck="false"${S.done?' readonly':''}>`;
    }
    html+=`<span class="blank-wrap"><sup class="bnum">${i+1}</sup><span class="pfx">${escH(bl[i].prefix)}</span><span class="lboxes">${boxes}</span></span>`;
    html+=segs[i+1];
  }
  html+=segs[11]+'</p>';
  let keyHTML='';
  if(S.done){
    keyHTML='<div style="margin-top:22px;border-top:1px solid var(--border);padding-top:16px;"><div style="font-weight:700;color:var(--pri);margin-bottom:10px;font-size:.9em;">Answer Key</div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;">';
    bl.forEach((b,i)=>{
      const u=r1ans[i]||'', ok=u.toLowerCase()===b.suffix.toLowerCase();
      keyHTML+=`<div style="padding:9px 8px;border-radius:8px;background:${ok?'#e8f5e9':'#ffebee'};font-size:.83em;text-align:center;">
        <div style="font-weight:700;color:${ok?'var(--ok)':'var(--err)'};">${i+1}. ${escH(b.ans)}</div>
        <div style="font-size:.85em;color:var(--gray);margin-top:2px;">${ok?'✓ Correct':`answer: <em>${escH(b.suffix)}</em>`}</div>
        ${!ok&&u?`<div style="color:var(--err);font-size:.85em;">you typed: ${escH(u)}</div>`:''}
      </div>`;
    });
    keyHTML+='</div></div>';
  }
  app().innerHTML=`
    <div class="ph"><div class="pt">Module ${S.module} — Complete the Words</div><div class="ps">Questions 1–10 · Type the missing letters to complete each word</div></div>

// ===== Q-TIMER (per-question countdown) =====
var _qt=null;
function stopQTimer(){clearInterval(_qt);_qt=null;}
function startQTimer(total,onExpire,ringId,numId,barId){
  stopQTimer();
  var rem=total;
  _qtimerUI(rem,total,ringId,numId,barId);
  _qt=setInterval(function(){
    rem--;
    _qtimerUI(rem,total,ringId,numId,barId);
    if(rem<=0){stopQTimer();if(onExpire)onExpire();}
  },1000);
}
function _qtimerUI(val,total,ringId,numId,barId){
  var frac=Math.max(0,val/total);
  var C=163.4; // 2π×26
  var lo=val<=5;
  var col=lo?'var(--err)':'var(--acc)';
  var colN=lo?'var(--err)':'var(--pri)';
  if(ringId){var r=$(ringId);if(r){r.style.strokeDashoffset=C*(1-frac);r.style.stroke=col;}}
  if(numId){var n=$(numId);if(n){n.textContent=Math.max(0,val);n.style.color=colN;}}
  if(barId){var b=$(barId);if(b){b.style.width=(frac*100)+'%';b.style.background=lo?'var(--err)':'var(--pri)';}}
}
function mkRing(ringId,numId,total){
  var C=163.4;
  return`<div style="display:flex;flex-direction:column;align-items:center;gap:6px;margin:20px 0 12px;">
    <div class="cring-wrap">
      <svg viewBox="0 0 60 60" width="80" height="80" style="transform:rotate(-90deg)">
        <circle cx="30" cy="30" r="26" fill="none" stroke="#e0e0e0" stroke-width="5"/>
        <circle id="${ringId}" cx="30" cy="30" r="26" fill="none" stroke="var(--acc)" stroke-width="5" stroke-linecap="round" style="stroke-dasharray:${C};stroke-dashoffset:0;transition:stroke-dashoffset .9s linear;"/>
      </svg>
      <span id="${numId}" class="cring-num">${total}</span>
    </div>
    <div style="font-size:.75em;color:var(--gray);">seconds remaining</div>
  </div>`;
}
function mkQtimerBar(numId,barId){
  return`<div class="qtimer"><span style="font-size:.8em;color:var(--gray);">⏱</span><div class="qtimer-bar"><div id="${barId}" class="qtimer-fill" style="width:100%;"></div></div><span style="font-size:1.05em;font-weight:700;color:var(--pri);min-width:28px;text-align:right;" id="${numId}">20</span><span style="font-size:.75em;color:var(--gray);">s</span></div>`;
}

function renderListening(){

function renderListeningLR(sec){
  stopQTimer();
  const qi=S.lQIdx,q=sec.qs[qi],globalIdx=sec.qStart+qi;
  const lans=S.lModule===1?S.l1ans:S.l2ans;

  const totalQs=mod.sections.reduce(function(a,s){return a+s.qs.length;},0);
  let optsHTML='';
  q.opts.forEach(function(o,oi){
    let cls='opt';
    if(S.done){cls+=oi===q.ans?' cor':(sel===oi?' wrong':'');}else if(sel===oi)cls+=' sel';
    optsHTML+=`<div class="${cls}" onclick="selListeningMCQ(${globalIdx},${oi})"><span class="opt-lt">${'ABCD'[oi]}</span><span class="akshar">${escH(o)}</span></div>`;
  });
  const isLastQ=qi===sec.qs.length-1;
  const isLastSec=S.lSecIdx===mod.sections.length-1;
  const nextFn=isLastQ?(isLastSec?(S.lModule===1?'goListeningM2()':'goWriting()'):'nextListeningSection()'):'nextListeningLRQ()';
  const nextLbl=isLastQ&&isLastSec?(S.lModule===1?'Start Module 2 →':'Start Writing →'):'Next →';
  const audId='lr_'+S.lModule+'_'+qi;
  app().innerHTML=`
    <div class="ph"><div class="pt">Module ${S.lModule} — Choose the Best Response</div><div class="ps">Question ${globalIdx+1} of ${totalQs}</div></div>

      <button class="btn btn-acc" onclick="${nextFn}">${nextLbl}</button>
    </div>`;
  if(!S.done){
    var expire=isLastQ?(isLastSec?(S.lModule===1?goListeningM2:goWriting):nextListeningSection):nextListeningLRQ;
    var aud=$(audId+'_aud');
    if(aud){
      aud.play();
      aud.addEventListener('waiting',function(){aud.play().catch(function(){});});
      aud.addEventListener('ended',function(){
        var tw=$('lr_twrap');if(tw)tw.style.display='';

}
function renderListeningPanel(sec){
  const typeLabel=sec.type==='conversation'?'Short Conversation':sec.type==='announcement'?'Announcement':'Academic Talk';
  const mod=S.lModule===1?D.l1:D.l2;
  const totalQs=mod.sections.reduce(function(a,s){return a+s.qs.length;},0);
  const subLabel=sec.subject?sec.subject+' · ':'';
  // ── Listen phase: play audio first ──
  if(S.lPhase==='listen'){
    const audId='lp_'+S.lModule+'_'+S.lSecIdx;
    app().innerHTML=`
      <div class="ph"><div class="pt">Module ${S.lModule} — ${escH(typeLabel)}</div><div class="ps">${subLabel}Questions ${sec.qStart+1}–${sec.qStart+sec.qs.length} of ${totalQs}</div></div>

  stopQTimer();
  const lans=S.lModule===1?S.l1ans:S.l2ans;
  const qi=S.lQIdx,q=sec.qs[qi],gi=sec.qStart+qi,sel=lans[gi];
  let optsHTML='';
  q.opts.forEach(function(o,oi){
    let cls='opt';
    if(S.done){cls+=oi===q.ans?' cor':(sel===oi?' wrong':'');}else if(sel===oi)cls+=' sel';
    optsHTML+=`<div class="${cls}" onclick="selListeningMCQ(${gi},${oi})"><span class="opt-lt">${'ABCD'[oi]}</span><span class="akshar">${escH(o)}</span></div>`;
  });
  const isLastQ=qi===sec.qs.length-1;
  const isLastSec=S.lSecIdx===mod.sections.length-1;
  const nextFnStr=isLastQ?(isLastSec?(S.lModule===1?'goListeningM2()':'goWriting()'):'nextListeningSection()'):'nextListeningPanelQ()';
  const nextLbl=isLastQ&&isLastSec?(S.lModule===1?'Start Module 2 →':'Start Writing →'):'Next →';
  app().innerHTML=`
    <div class="ph"><div class="pt">Module ${S.lModule} — ${escH(typeLabel)}</div><div class="ps">${subLabel}Question ${gi+1} of ${totalQs}</div></div>

      ${mkQtimerBar('lp_tnum','lp_tbar')}

    </div>
    <div class="nav">
      ${qi>0?`<button class="btn btn-gray" onclick="prevListeningPanelQ()">← Previous</button>`:'<div></div>'}
      <button class="btn btn-acc" onclick="${nextFnStr}">${nextLbl}</button>
    </div>`;
  if(!S.done){
    var expire=isLastQ?(isLastSec?(S.lModule===1?goListeningM2:goWriting):nextListeningSection):nextListeningPanelQ;
    startQTimer(20,expire,null,'lp_tnum','lp_tbar');
  }
}
function startListeningQs(){
  S.lPhase='qs';S.lQIdx=0;
  renderListeningPanel((S.lModule===1?D.l1:D.l2).sections[S.lSecIdx]);
}
function nextListeningPanelQ(){S.lQIdx++;renderListeningPanel((S.lModule===1?D.l1:D.l2).sections[S.lSecIdx]);}
function prevListeningPanelQ(){if(S.lQIdx>0){S.lQIdx--;renderListeningPanel((S.lModule===1?D.l1:D.l2).sections[S.lSecIdx]);}}
function selListeningMCQ(gi,oi){
  if(S.done)return;
  if(S.lModule===1)S.l1ans[gi]=oi;else S.l2ans[gi]=oi;
  // Update opt classes in-place (no re-render, no timer reset)
  document.querySelectorAll('.opt').forEach(function(el){
    var oc=el.getAttribute('onclick')||'';
    var m=oc.match(/selListeningMCQ\((\d+),(\d+)\)/);
    if(m&&parseInt(m[1])===gi){
      el.className='opt'+(parseInt(m[2])===oi?' sel':'');
    }
  });
}
function nextListeningLRQ(){stopQTimer();S.lQIdx++;renderListeningLR((S.lModule===1?D.l1:D.l2).sections[S.lSecIdx]);}
function prevListeningLRQ(){stopQTimer();if(S.lQIdx>0){S.lQIdx--;renderListeningLR((S.lModule===1?D.l1:D.l2).sections[S.lSecIdx]);}}
function nextListeningSection(){
  const mod=S.lModule===1?D.l1:D.l2;
  S.lSecIdx++;S.lQIdx=0;S.lPhase='listen';
  if(S.lSecIdx>=mod.sections.length){if(S.lModule===1)goListeningM2();else goWriting();}
  else renderListening();
}

// ===== AI SCORING (preserved exactly) =====
async function callScore(response,rubric,ctx){
  const isEmail=rubric.indexOf('email')!==-1||rubric.indexOf('Email')!==-1;
  const taskNote=isEmail
    ? 'This is a TOEFL Write an Email task (target: 80-120 words). A Band 5 email must: address ALL bullet-point tasks explicitly, open with a clear purpose statement, use varied sentence structures (simple, compound, complex, and compound-complex), include at least one subordinate clause and one polite conditional (e.g., "I would appreciate it if..."), and close professionally. The Band 5 example must be 100-120 words. IMPORTANT: Format the email with proper line breaks using \\n. Each part on its own line: salutation, body paragraphs, closing, and name. Example structure: "Dear [Name],\\n\\n[Body paragraph 1]\\n\\n[Body paragraph 2]\\n\\nSincerely,\\n[Your name]"'
    : 'This is a TOEFL Academic Discussion task (target: 100-150 words). A Band 5 response must: clearly state a personal position in the opening sentence, engage directly with at least one classmate\'s point (agree, disagree, or extend it), support the argument with a concrete example or hypothetical scenario, use a mix of sentence types including at least one adverbial clause, one relative clause, and one concessive clause (e.g., "While X may be true..."), and end with a forward-looking or synthesizing statement. The Band 5 example must be 130-150 words.';
  const prompt='You are a certified 2026 TOEFL iBT writing examiner. Evaluate this student response for: '+rubric+'.\n\n'
    +taskNote+'\n\n'
    +'Context:\n'+ctx+'\n\n'
    +'Student Response:\n'+response+'\n\n'
    +(isEmail
    ? 'Score 0–5 by averaging these 5 dimensions (round to nearest integer):\n1. Task Fulfillment: 5=All required points fully addressed; 4=Most points addressed, minor missing detail; 3=Some points missing or unclear; 2=Many points missing or off-topic; 1=Almost no task completion; 0=No response\n2. Elaboration: 5=Each idea has clear explanation or example; 4=Ideas explained but not deeply; 3=Some ideas lack explanation; 2=Mostly unsupported statements; 1=Bare phrases only; 0=No content\n3. Language Use: 5=Varied sentence structures + precise vocabulary; 4=Some variation + generally appropriate vocabulary; 3=Limited variation, repetitive wording; 2=Very simple sentence patterns; 1=Fragmented or incorrect sentences; 0=Not in English\n4. Social Conventions: 5=Fully appropriate tone and format (greeting, closing, politeness); 4=Mostly appropriate with minor issues; 3=Some awkward or inconsistent tone; 2=Inappropriate tone; 1=No awareness of format; 0=None\n5. Accuracy: 5=0–2 minor errors, no impact on understanding; 4=Few errors, meaning always clear; 3=Noticeable errors but understandable; 2=Frequent errors affecting clarity; 1=Errors make text hard to understand; 0=Unreadable\n\n'
    : 'Calibrate your scoring for non-native English learners preparing for TOEFL. A score of 4–5 should be awarded to responses that clearly address the prompt, express a position with reasonable support, and demonstrate sufficient language control for academic communication — even if the writing is not perfectly sophisticated. Reserve scores of 1–2 for responses that are largely off-topic, incoherent, or grammatically incomprehensible. For a non-native speaker at TOEFL B2 level, a response that addresses all parts of the prompt with a clear position, at least one concrete example, and generally coherent structure should receive a minimum score of 4, regardless of sentence variety.\n\nScore 0–5 by averaging these 5 dimensions (round to nearest integer):\n1. Relevance: 5=Directly answers topic and clearly contributes; 4=Mostly relevant; 3=Partially relevant; 2=Often off-topic; 1=Mostly irrelevant; 0=No response\n2. Argument Development: 5=Clear opinion + at least 2 supported ideas with explanation or example; 4=Clear opinion + at least 1 supported idea; 3=Opinion present but weak support; 2=Ideas unclear or unsupported; 1=No clear argument; 0=None\n3. Language Use: 5=Varied sentence structures + precise vocabulary; 4=Some variation + generally appropriate vocabulary; 3=Limited variation, repetitive wording; 2=Very simple sentence patterns; 1=Fragmented or incorrect sentences; 0=Not in English\n4. Clarity: 5=Ideas flow logically and are easy to follow; 4=Mostly clear with minor confusion; 3=Some unclear connections; 2=Hard to follow; 1=Mostly unclear; 0=None\n5. Accuracy: 5=0–2 minor errors, no impact on understanding; 4=Few errors, meaning always clear; 3=Noticeable errors but understandable; 2=Frequent errors affecting clarity; 1=Errors make text hard to understand; 0=Unreadable\n\n'
    )
    +'Return ONLY valid JSON with no markdown fences:\n'
    +'{"score":0,'
    +'"rationale":"中文評分理由，說明得分依據（60字內）",'
    +'"strengths":"中文優點，具體指出寫得好的地方（70字內）",'
    +'"weaknesses":"中文改進建議，具體說明如何提升（70字內）",'
    +'"corrected_sentence":"Take the weakest sentence from the student response and rewrite it with richer grammar and vocabulary. Format: Original → Improved",'

var R_TABLE=[
  {min:40,max:40,score:6.0},{min:37,max:39,score:5.5},{min:33,max:36,score:5.0},
  {min:30,max:32,score:4.5},{min:26,max:29,score:4.0},{min:23,max:25,score:3.5},
  {min:19,max:22,score:3.0},{min:16,max:18,score:2.5},{min:13,max:15,score:2.0},
  {min:9,max:12,score:1.5},{min:6,max:8,score:1.0},{min:1,max:5,score:0.5},{min:0,max:0,score:0.0}
];
function toflR(a,b,c){var t=a+b+c;for(var k=0;k<R_TABLE.length;k++){if(t>=R_TABLE[k].min&&t<=R_TABLE[k].max)return R_TABLE[k].score;}return 0;}
function toflW(w1ok,w2sc,w3sc){
  var parts=[w1ok/10],weights=[1];
  if(w2sc){parts.push(w2sc.score/5);weights.push(1);}
  if(w3sc){parts.push(w3sc.score/5);weights.push(1);}
  var sum=0,wtot=0;
  for(var k=0;k<parts.length;k++){sum+=parts[k]*weights[k];wtot+=weights[k];}
  return Math.round(sum/wtot*6*2)/2;
}
function toflTotal(r,w){return Math.round((r+w)/2*2)/2;}
function scoreColor(v){return v>=5?'var(--ok)':v>=3.5?'var(--pri)':'var(--err)';}

    ?'<span style="font-size:3.2em;font-weight:900;color:'+scoreColor(tT)+';">'+fmtScore(tT)+'</span><span style="font-size:1.1em;color:var(--gray);font-weight:400;"> / 6</span>'
    :spinnerSm+'<span style="font-size:.88em;color:var(--gray);margin-left:10px;">Waiting for writing scores…</span>';

  app().innerHTML=
    '<div style="padding:20px 0 50px;">'
    +'<div class="res-total">'
    +'<div style="font-size:.82em;color:var(--gray);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;">TOEFL Practice Test '+_tn+' &middot; Score Report</div>'
    +'<div style="font-size:.72em;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);margin-bottom:4px;">Total Score</div>'
    +'<div style="margin-bottom:4px;">'+totalDisp+'</div>'
    +'<div style="font-size:.8em;color:var(--gray);margin-top:2px;">(Reading + Writing average, converted to TOEFL 0–6 scale)</div>'
    +'</div>'
    +'<div class="res-grid" style="margin-bottom:22px;grid-template-columns:repeat(3,1fr);">'+rCard+lCard+wCardManual+'</div>'
    +'<div style="text-align:center;margin-bottom:28px;"><button class="btn btn-pri" style="font-size:.9em;padding:10px 28px;" onclick="location.reload()">&#8635; Start a New Test</button></div>'
    +'<div style="font-size:.82em;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);margin-bottom:12px;">Answer Review</div>'
    +rRev+lRev+w1Rev+wRev
    +'</div>';
}

// ===== ESCAPE HTML =====
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ===== INTRO =====
function renderIntro(){
  var rInfo=isETS?'40 questions<br>24 minutes':'40 questions<br>20 minutes';
  var structHTML='';
  if(isETS){
    structHTML=
      '<div>📝 Module 1 &nbsp;— Complete the Words + Reading <span style="float:right;">20 Q · 12 min</span></div>'
     +'<div>📝 Module 2 &nbsp;— Complete the Words + Reading <span style="float:right;">20 Q · 12 min</span></div>'
     +'<div style="font-size:.8em;color:var(--acc);margin:2px 0 8px;">⚠️ Cannot return to Module 1 once Module 2 begins</div>'
     +'<div>🎧 Listening Module 1 — Listen &amp; Respond + Conversations + Talks <span style="float:right;">18 Q · 10 min</span></div>'
     +'<div>🎧 Listening Module 2 — Listen &amp; Respond + Conversations + Talks <span style="float:right;">16 Q · 10 min</span></div>'
     +'<div>🔤 Writing Part 1 — Build a Sentence <span style="float:right;">10 Q · 5 min</span></div>'
     +'<div>📧 Writing Part 2 — Email Writing <span style="float:right;">1 Task · 7 min</span></div>'
     +'<div>💬 Writing Part 3 — Academic Discussion <span style="float:right;">1 Task · 10 min</span></div>'
     +'<div>🎤 Speaking Part 1 — Listen and Repeat <span style="float:right;">7 items · 15 min</span></div>'
     +'<div>🎤 Speaking Part 2 — Interview <span style="float:right;">4 questions</span></div>';
  } else {
    structHTML=
      '<div>📝 Reading Part 1 &nbsp;— Complete the Words <span style="float:right;">10 Q</span></div>'
     +'<div>📰 Reading Part 2 &nbsp;— Reading in Daily Life <span style="float:right;">15 Q</span></div>'
     +'<div>🎓 Reading Part 3 &nbsp;— Academic Passages <span style="float:right;">15 Q</span></div>'
     +'<div>🔤 Writing Part 1 &nbsp;&nbsp;— Build a Sentence <span style="float:right;">10 Q</span></div>'
     +'<div>📧 Writing Part 2 &nbsp;&nbsp;— Email Writing <span style="float:right;">1 Task</span></div>'
     +'<div>💬 Writing Part 3 &nbsp;&nbsp;— Academic Discussion <span style="float:right;">1 Task</span></div>';
  }
  app().innerHTML=`
    <div class="intro">
      <div style="font-size:3.2em;margin-bottom:6px;">📝</div>
      <div class="ititle">TOEFL iBT</div>
      <div style="font-size:1.4em;font-weight:800;color:var(--acc);margin-bottom:2px;">Practice Test <span id="test-num-intro"></span></div>
      <div style="font-size:.95em;color:var(--gray);margin-bottom:24px;">2026 Edition</div>
      <div class="iinfo">
        <div class="icard"><h3>📖 Reading</h3><p>${rInfo}</p></div>
        <div class="icard"><h3>🎧 Listening</h3><p>34 questions<br>20 minutes</p></div>
        <div class="icard"><h3>✍️ Writing</h3><p>12 questions<br>23 minutes</p></div>
        <div class="icard"><h3>🎤 Speaking</h3><p>11 items<br>15 minutes</p></div>
      </div>
      <div class="struct">
        <div style="font-weight:700;margin-bottom:10px;color:var(--txt);">Test Structure</div>
        <div style="font-size:.88em;color:var(--gray);line-height:2.1;">${structHTML}</div>
      </div>
      <button class="btn btn-pri" style="font-size:1.08em;padding:14px 44px;" onclick="goReading()">Start Test →</button>
    </div>`;
}

// ===== INIT =====
const _tn=(D.meta&&D.meta.testNumber)?D.meta.testNumber:'';
document.title='TOEFL iBT Practice Test '+_tn;
renderIntro();
var _el=document.getElementById('test-num-intro');
if(_el)_el.textContent=_tn;
</script>

<script>
function devJump(screen,mod,sec,phase){
  stopTimer();
  S.screen=screen;S.lModule=mod;S.lSecIdx=sec;S.lQIdx=0;S.lPhase=phase;
  $('slbl').textContent='Listening Section';
  $('plbl').textContent='Module '+mod+' of 2';
  $('tup').style.display='none';
  document.getElementById('devpanel').style.display='none';
  renderListening();
}
function devJumpSp(part){
  stopTimer();
  S.screen='sp';S.spPart=part;S.spQIdx=0;
  $('slbl').textContent='Speaking Section';
  $('tup').style.display='none';
  document.getElementById('devpanel').style.display='none';
  renderSpeaking();
}
</script>
